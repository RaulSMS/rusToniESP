<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Card Storage</title>
    <style>
        body { font-family: sans-serif; margin: 30px; background: #1e293b; color: #f8fafc; }
        .container { max-width: 700px; margin: 0 auto; }
        table { width: 100%; margin: 20px 0; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #334155; color: #38bdf8; }
        tr:hover { background-color: #1e293b; }
        .upload-box { background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #38bdf8; }
        .btn { padding: 6px 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-del { background: #ef4444; color: white; margin-left: 5px; }
        .btn-down { background: #22c55e; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; }
        .back-link:hover { color: #f8fafc; }
        .nav-links { margin-bottom: 15px; font-size: 1.1rem; }
        .nav-links a { color: #38bdf8; text-decoration: none; }
        h2, h3 { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Index of {0}</h2>
        
        <div class="nav-links">
            {2}
        </div>

        <div class="upload-box">
            <h3>Upload File to This Directory</h3>
            <input type="file" id="fileInput">
            <button type="button" class="btn" onclick="uploadFile()">Upload</button>
            <div id="status" style="margin-top: 10px; font-weight: bold;"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Size / Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {1}
            </tbody>
        </table>
        <a href="/" class="back-link">&larr; Back to Dashboard</a>
    </div>

    <script>
        const currentPath = "{0}";

        function uploadFile() {
            const input = document.getElementById('fileInput');
            const status = document.getElementById('status');
            if (input.files.length === 0) {
                status.innerText = "Please select a file first.";
                status.style.color = "#ef4444";
                return;
            }
            const file = input.files[0];
            status.innerText = "Uploading " + file.name + "...";
            status.style.color = "#38bdf8";

            fetch('/upload?path=' + encodeURIComponent(currentPath), {
                method: 'POST',
                headers: { 'X-File-Name': encodeURIComponent(file.name) },
                body: file
            }).then(res => {
                if (res.ok) {
                    status.innerText = "✅ Upload successful! Refreshing...";
                    status.style.color = "#22c55e";
                    setTimeout(() => window.location.reload(), 1200);
                } else {
                    status.innerText = "❌ Upload failed.";
                    status.style.color = "#ef4444";
                }
            }).catch(err => {
                status.innerText = "❌ Error: " + err;
                status.style.color = "#ef4444";
            });
        }

        function deleteItem(itemPath) {
            if (!confirm("Are you sure you want to delete " + itemPath + "?")) return;
            
            fetch('/delete?path=' + encodeURIComponent(itemPath), {
                method: 'DELETE'
            }).then(res => {
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("❌ Failed to delete item.");
                }
            }).catch(err => alert("Error: " + err));
        }
    </script>
</body>
</html>
