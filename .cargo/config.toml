[build]
# --- MASTER HARDWARE SWITCHBOARD ---
# Toggle between these two lines to swap your compilation target entirely.

# target = "xtensa-esp32s3-espidf"
target = "xtensa-esp32-espidf"

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
# We fixed the global tools directory and firmware version here.
# Your custom build.rs handles specific MCU pin mapping, saving RAM.
ESP_IDF_VERSION = "v5.5.3"
ESP_IDF_TOOLS_INSTALL_DIR = "workspace"